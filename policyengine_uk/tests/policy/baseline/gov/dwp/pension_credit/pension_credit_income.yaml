- name: All income sources are included.
  period: 2021
  input:
    people:
      person:
        age: 70
        employment_income: 1
        state_pension: 4
        private_pension_income: 8
        esa_contrib: 32
        jsa_contrib: 64
        self_employment_income: 128
    benunits:
      benunit:
        members: person
        working_tax_credit: 2
    households:
      household:
        members: person
        savings: 11_000
  output:
    pension_credit_deemed_income: 104
    pension_credit_income: 343

- name: Interest and dividends are not counted directly in Pension Credit income.
  period: 2021
  input:
    people:
      person:
        age: 70
        savings_interest_income: 500
        dividend_income: 300
    benunits:
      benunit:
        members: person
    households:
      household:
        members: person
        savings: 10_000
  output:
    pension_credit_deemed_income: 0
    pension_credit_income: 0

- name: Pension Credit deemed income starts above the capital disregard.
  period: 2021
  input:
    people:
      person:
        age: 70
    benunits:
      benunit:
        members: person
    households:
      household:
        members: person
        savings: 10_001
  output:
    pension_credit_assessable_capital: 10_001
    pension_credit_deemed_income: 52
    pension_credit_income: 52

- name: Case 4, property income and non-main-home capital count for Pension Credit.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 79
        property_income: 10_476
    benunits:
      benunit:
        members: [person1]
    households:
      household:
        members: [person1]
        other_residential_property_value: 55_370
        savings: 455
  output:
    pension_credit_assessable_capital: 55_825
    pension_credit_deemed_income: 4_784
    pension_credit_income: 15_260
    pension_credit: 0

- name: Case 5, 2026 Pension Credit uses tariff income with the published guarantee rate.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 81
        savings_interest_income: 7_488
        dividend_income: 380
    benunits:
      benunit:
        members: [person1]
    households:
      household:
        members: [person1]
        savings: 87_285
        corporate_wealth: 12_650
  output:
    pension_credit_assessable_capital: 99_935
    pension_credit_deemed_income: 9_360
    pension_credit_income: 9_360
    standard_minimum_guarantee: 12_376
    guarantee_credit: 3_016
    pension_credit: 3_016
