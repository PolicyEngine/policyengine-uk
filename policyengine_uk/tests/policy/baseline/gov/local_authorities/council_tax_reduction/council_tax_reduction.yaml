- name: Merton applies its 2026 local non-dependant deduction schedule
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      claimant:
        age: 35
      non_dep:
        age: 25
        employment_income: 15_000
        weekly_hours: 16
    benunits:
      claimant_benunit:
        members: [claimant]
        would_claim_uc: false
        claims_all_entitled_benefits: true
      non_dep_benunit:
        members: [non_dep]
    households:
      household:
        members: [claimant, non_dep]
        country: ENGLAND
        local_authority: MERTON
        council_tax: 1_800
        savings: 0
  output:
    council_tax_reduction_scheme_supported: true
    council_tax_reduction: 1_248.80

- name: Merton exempts UC non-dependants with no earned income
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      claimant:
        age: 35
      non_dep:
        age: 25
        weekly_hours: 16
    benunits:
      claimant_benunit:
        members: [claimant]
        would_claim_uc: false
        claims_all_entitled_benefits: true
      non_dep_benunit:
        members: [non_dep]
        would_claim_uc: true
    households:
      household:
        members: [claimant, non_dep]
        country: ENGLAND
        local_authority: MERTON
        council_tax: 1_800
        savings: 0
  output:
    council_tax_reduction: 1_800

- name: Merton UC claimant uses UC maximum amount and DWP income
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      claimant:
        age: 35
    benunits:
      claimant_benunit:
        members: [claimant]
        would_claim_uc: true
        claims_all_entitled_benefits: true
        uc_maximum_amount: 5_000
        uc_income_reduction: 2_500
        uc_earned_income: 6_000
        uc_unearned_income: 0
    households:
      household:
        members: [claimant]
        country: ENGLAND
        local_authority: MERTON
        council_tax: 1_800
        savings: 0
  output:
    universal_credit: 2_500
    council_tax_reduction: 1_100

