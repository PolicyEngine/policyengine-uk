- name: Income Support still paid in 2025 (scheme active until 31 March 2026)
  period: 2025
  absolute_error_margin: 5
  input:
    people:
      p1:
        age: 26
        income_support_reported: 3000
      c1:
        age: 4
        is_child: true
    benunits:
      b1:
        members: [p1, c1]
        would_claim_IS: true
    households:
      household:
        members: [p1, c1]
        savings: 1000
  output:
    income_support: 5252.0073

