- name: All sources summed
  period: 2020
  absolute_error_margin: 0
  input:
    carers_allowance: 10_000
    jsa_contrib: 1_000
    private_pension_income: 100
    savings_interest_income: 10
    dividend_income: 1
  output:
    uc_unearned_income: 11_111

- name: Tariff income is exposed in unearned income
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person:
        age: 30
    benunits:
      benunit:
        members: person
    households:
      household:
        members: person
        savings: 6_001
  output:
    uc_unearned_income: 4.35 * 12

- name: Savings interest is folded into capital when tariff income applies
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person:
        age: 30
        savings_interest_income: 120
    benunits:
      benunit:
        members: person
    households:
      household:
        members: person
        savings: 6_001
  output:
    uc_tariff_income: 4.35 * 12
    uc_unearned_income: 4.35 * 12
