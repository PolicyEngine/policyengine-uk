- name: Has no working-age adults
  period: 2020
  absolute_error_margin: 0
  input:
    people:
      person_1:
        age: 70
      person_2:
        age: 72
    benunits:
      benunit:
        members: [person_1, person_2]
  output:
    is_uc_eligible: false

- name: Has one working-age adult
  period: 2020
  absolute_error_margin: 0
  input:
    people:
      person_1:
        age: 25
      person_2:
        age: 6
    benunits:
      benunit:
        members: [person_1, person_2]
  output:
    is_uc_eligible: true

- name: Working-age adult remains eligible at the upper capital limit
  period: 2025
  absolute_error_margin: 0
  input:
    people:
      person:
        age: 30
    benunits:
      benunit:
        members: person
    households:
      household:
        members: person
        savings: 16_000
  output:
    is_uc_eligible: true

- name: Working-age adult is ineligible above the upper capital limit
  period: 2025
  absolute_error_margin: 0
  input:
    people:
      person:
        age: 30
    benunits:
      benunit:
        members: person
    households:
      household:
        members: person
        savings: 16_001
  output:
    is_uc_eligible: false

- name: Multi-benunit households use benunit-reported capital
  period: 2025
  absolute_error_margin: 0
  input:
    people:
      person_1:
        age: 30
      person_2:
        age: 32
    benunits:
      benunit_1:
        members: person_1
        uc_reported_capital: 10_000
      benunit_2:
        members: person_2
        uc_reported_capital: 10_000
    households:
      household:
        members: [person_1, person_2]
        savings: 20_000
  output:
    uc_assessable_capital: [10_000, 10_000]
    is_uc_eligible: [true, true]

- name: Multi-benunit households default household capital to the head benunit
  period: 2025
  absolute_error_margin: 0
  input:
    people:
      person_1:
        age: 32
      person_2:
        age: 30
    benunits:
      benunit_1:
        members: person_1
      benunit_2:
        members: person_2
    households:
      household:
        members: [person_1, person_2]
        savings: 20_000
  output:
    uc_assessable_capital: [20_000, 0]
    is_uc_eligible: [false, true]

- name: Reported capital can still exceed the upper threshold
  period: 2025
  absolute_error_margin: 0
  input:
    people:
      person_1:
        age: 32
      person_2:
        age: 30
    benunits:
      benunit_1:
        members: person_1
        uc_reported_capital: 20_000
      benunit_2:
        members: person_2
        uc_reported_capital: 20_000
    households:
      household:
        members: [person_1, person_2]
        savings: 40_000
  output:
    uc_assessable_capital: [20_000, 20_000]
    is_uc_eligible: [false, false]

- name: Savings interest can push capital over the upper threshold
  period: 2025
  absolute_error_margin: 0
  input:
    people:
      person:
        age: 30
        savings_interest_income: 20
    benunits:
      benunit:
        members: person
    households:
      household:
        members: person
        savings: 15_990
  output:
    uc_assessable_capital: 16_010
    is_uc_eligible: false

- name: Corporate wealth can push capital over the upper threshold
  period: 2025
  absolute_error_margin: 0
  input:
    people:
      person:
        age: 30
    benunits:
      benunit:
        members: person
    households:
      household:
        members: person
        corporate_wealth: 50_000
  output:
    uc_assessable_capital: 50_000
    is_uc_eligible: false
