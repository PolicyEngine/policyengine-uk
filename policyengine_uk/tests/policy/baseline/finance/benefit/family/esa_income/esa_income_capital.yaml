- name: Income-related ESA allocates household capital by adult share when nobody reports the award
  period: 2026
  absolute_error_margin: 0
  input:
    people:
      adult_1:
        age: 40
      adult_2:
        age: 42
      adult_3:
        age: 44
    benunits:
      benunit_1:
        members: adult_1
      benunit_2:
        members: [adult_2, adult_3]
    households:
      household:
        members: [adult_1, adult_2, adult_3]
        savings: 18_000
  output:
    esa_income_assessable_capital: [6_000, 12_000]

- name: Income-related ESA does not dilute claimant capital across unrelated non-claiming adults
  period: 2026
  absolute_error_margin: 0
  input:
    people:
      claimant:
        age: 40
        esa_income_reported: 1_000
      unrelated_adult:
        age: 44
    benunits:
      claimant_benunit:
        members: claimant
      unrelated_benunit:
        members: unrelated_adult
    households:
      household:
        members: [claimant, unrelated_adult]
        savings: 18_000
  output:
    esa_income_assessable_capital: [18_000, 0]

