- name: Income-related ESA capital test ignores the main residence
  period: 2026
  absolute_error_margin: 0
  input:
    people:
      claimant:
        age: 40
        esa_income_reported: 1_000
    benunits:
      benunit:
        members: claimant
    households:
      household:
        members: claimant
        savings: 1_000
        owned_land: 500
        corporate_wealth: 2_000
        main_residence_value: 300_000
        other_residential_property_value: 3_000
        non_residential_property_value: 4_000
  output:
    esa_income_assessable_capital: 10_500

