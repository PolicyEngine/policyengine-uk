- name: Income-related ESA capital screening can activate the existing Income Support path
  period: 2025
  absolute_error_margin: 1
  input:
    people:
      claimant:
        age: 30
        esa_income_reported: 1
        income_support_reported: 1
      child:
        age: 4
        is_child: true
    benunits:
      benunit:
        members: [claimant, child]
        would_claim_IS: true
    households:
      household:
        members: [claimant, child]
        savings: 6_001
  output:
    esa_income: 0
    income_support_eligible: true
    income_support: 5_252.0073
