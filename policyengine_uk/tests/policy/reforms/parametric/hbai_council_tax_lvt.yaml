- name: Abolishing council tax increases HBAI household net income
  period: 2024
  absolute_error_margin: 1
  input:
    gov.contrib.abolish_council_tax: true
    people:
      person:
        age: 30
        employment_income: 50_000
    benunits:
      benunit:
        members: ["person"]
    households:
      household:
        members: ["person"]
        council_tax: 2_000
  output:
    hbai_household_net_income: 39_520

