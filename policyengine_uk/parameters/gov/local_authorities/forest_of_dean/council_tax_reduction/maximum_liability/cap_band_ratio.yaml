description: Forest of Dean Council Tax band ratio used to cap working-age maximum eligible liability at the Band E equivalent. Paragraph 57.1(a) and 57.6(a) cap working-age eligible liability at "a Band E equivalent" for both Class A and Class B applicants. The Band E ratio in the English council-tax band schedule is 11/9 (about 1.222) of Band D.
values:
  2026-04-01: 1.222222222222222
