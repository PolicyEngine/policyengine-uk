description: Forest of Dean weekly non-dependant deduction by weekly gross income. Section 58 reproduces the prescribed Default Scheme schedule (footnote 18 directs that the amounts be uprated in line with the Council Tax Reduction Schemes (Prescribed Requirements) Regulations 2012), giving GBP 5.20 out-of-work or low-income, then GBP 10.60 / GBP 13.30 / GBP 15.95 for higher gross-income brackets.
