description: Maximum English council tax band ratio eligible for West Berkshire's non-vulnerable working-age Council Tax Reduction. Paragraph 29A caps the assessed liability at the council tax for a Band C property in the same parish. The Band C ratio in the English council-tax band schedule is 8/9 of Band D.
values:
  2026-04-01: 0.888888888888889
metadata:
