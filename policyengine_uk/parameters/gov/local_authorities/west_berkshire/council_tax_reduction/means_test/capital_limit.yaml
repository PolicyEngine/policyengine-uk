description: Strict capital cutoff for non-vulnerable working-age Class D or E applicants in West Berkshire. Paragraph 29(1)A removes entitlement for the entire billing year where capital is equal to or greater than this amount. The default 16,000 pound capital limit (paragraph 23) still applies to Class E1 vulnerable applicants and to pensioners.
values:
