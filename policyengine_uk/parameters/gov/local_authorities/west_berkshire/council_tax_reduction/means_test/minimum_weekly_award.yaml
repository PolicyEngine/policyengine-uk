description: Weekly minimum Council Tax Reduction below which a non-vulnerable working-age applicant receives no award in West Berkshire. Paragraph 29C cancels Class D or E entitlements that would otherwise fall below this floor. The minimum does not apply to Class E1 vulnerable applicants or to pensioners.
values:
  2026-04-01: 10
