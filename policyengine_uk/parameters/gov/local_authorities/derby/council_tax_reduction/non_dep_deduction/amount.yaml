documentation: |-
  Derby aligns Council Tax Support non-dependant rules and deduction rates to the Housing Benefit scheme, but does not use the two highest Housing Benefit deduction rates. The GBP 485 and GBP 605 Housing Benefit rates are therefore capped to the GBP 365-to-GBP 484.99 rate in this table. Derby also substitutes a GBP 4 weekly deduction for working non-dependants with gross weekly income below GBP 100 and for non-working passported or UC non-dependants.
