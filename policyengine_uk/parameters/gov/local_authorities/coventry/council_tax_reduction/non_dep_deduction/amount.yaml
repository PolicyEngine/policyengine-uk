    title: Coventry City Council Tax Reduction Scheme 2026/27, section 58
    href: https://www.coventry.gov.uk/downloads/file/46761/council-tax-support-scheme-2026-to-2027
documentation: |-
  The 2026/27 scheme states a default GBP 15.95 weekly deduction for remunerative-work non-dependants, reduced to GBP 5.20, GBP 10.60, or GBP 13.30 for the listed gross-income bands.
  This scale is keyed to normal gross weekly income, with the GBP 605+ bracket returning the default full working deduction.
