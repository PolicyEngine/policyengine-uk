description: St Helens Council Tax band ratio used to cap working-age maximum eligible liability at the Band D amount. Paragraph 9 restricts working-age support in Bands F, G and H to the Band D liability for the dwelling. The Band D ratio in the English council-tax band schedule is 1.
values:
  2026-04-01: 1
