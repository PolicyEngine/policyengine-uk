description: Tewkesbury weekly non-dependant deduction by weekly gross income. Tewkesbury follows the Default Scheme. Paragraph 30 of the Default Scheme, as amended before the scheme took effect by SI 2012/3085, sets deductions at GBP 3.65 (out-of-work or low-income), then GBP 7.25, GBP 9.15 and GBP 10.95 for higher gross-income brackets.
