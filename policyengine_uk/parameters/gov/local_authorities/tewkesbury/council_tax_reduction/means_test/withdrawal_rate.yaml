description: Tewkesbury Council Tax Reduction excess income withdrawal rate. Tewkesbury follows the prescribed Default Scheme, which applies the 2 6/7 per cent daily Class E taper (equivalent to 20 per cent weekly) to the difference between income and the applicable amount.
values:
