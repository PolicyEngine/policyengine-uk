description: >
  Model variables currently mapped to countable income-related Employment and
  Support Allowance capital. The Employment and Support Allowance Regulations
  2008 treat capital as assessable unless it is disregarded under Schedule 9.
  The current mappings are `savings` for liquid capital, `owned_land` for land
  held directly, `corporate_wealth` as the broad available proxy for share-like
  financial assets, `other_residential_property_value` for residential
  property other than the home, and `non_residential_property_value` for other
  land and premises. `main_residence_value` is excluded because Schedule 9
  paragraph 1 disregards premises occupied as the claimant's home. Other
  Schedule 9 disregards and the higher residential-care capital disregard are
  not yet modeled because the current dataset does not isolate those states or
  asset holdings. Because the dataset only provides household-level capital
  stocks, the model allocates the full household total to benunits with a
  reported income-related ESA award and only falls back to an adult-share
  proxy when nobody in the household is on that reported claim path. That
  allocation is a data approximation, not a legislated ownership rule.
